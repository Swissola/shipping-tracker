repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Local hook: run mypy from the project venv (where all runtime deps + type
  # stubs are installed) so the gate matches CI / `mypy ... --strict` exactly.
  # Avoids mirrors-mypy's isolated venv needing every typed dep mirrored in
  # additional_dependencies (which silently drifts as new deps are added).
  # Requires `pip install -e ".[dev]"` in the active environment.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, project venv)
        entry: python -m mypy
        language: system
        args: ["--strict", "shipping_tracker/", "tests/"]
        pass_filenames: false
        types: [python]
